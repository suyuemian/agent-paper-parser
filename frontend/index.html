<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多模态试卷智能解析 Agent</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f0f2f5; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 20px 40px; display: flex; align-items: center; gap: 15px; }
.header h1 { font-size: 22px; font-weight: 600; }
.header .badge { background: #e94560; padding: 4px 12px; border-radius: 12px; font-size: 12px; }
.container { max-width: 1400px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.panel { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.08); overflow: hidden; }
.panel-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.panel-body { padding: 20px; }
/* 上传区 */
.upload-zone { border: 2px dashed #d9d9d9; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all .3s; }
.upload-zone:hover, .upload-zone.drag-over { border-color: #0f3460; background: #f8f9ff; }
.upload-zone .icon { font-size: 48px; margin-bottom: 10px; }
.upload-zone p { color: #999; font-size: 14px; }
.upload-zone input { display: none; }
.preview-img { max-width: 100%; max-height: 300px; border-radius: 8px; border: 1px solid #eee; margin-top: 10px; display: none; }
/* 按钮 */
.btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all .3s; font-weight: 500; }
.btn-primary { background: #0f3460; color: #fff; }
.btn-primary:hover { background: #1a5276; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
/* 结果区 */
.ocr-result { margin-top: 15px; }
.text-block { padding: 10px 14px; margin: 6px 0; background: #f8f9fa; border-radius: 8px; border-left: 3px solid #0f3460; font-size: 14px; line-height: 1.6; display: flex; justify-content: space-between; align-items: center; }
.text-block .conf { font-size: 11px; color: #999; white-space: nowrap; margin-left: 10px; }
.text-block.low-conf { border-left-color: #e94560; background: #fff5f5; }
/* 聊天区 */
.chat-area { height: 500px; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; gap: 12px; }
.chat-msg { padding: 12px 16px; border-radius: 10px; font-size: 14px; line-height: 1.7; max-width: 90%; }
.chat-msg.user { background: #0f3460; color: #fff; align-self: flex-end; }
.chat-msg.agent { background: #f0f2f5; align-self: flex-start; }
.chat-msg.system { background: #fff3cd; align-self: center; font-size: 12px; text-align: center; max-width: 100%; }
.chat-msg pre { background: rgba(0,0,0,.05); padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 13px; margin: 8px 0; }
.chat-msg code { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; }
.chat-input-area { display: flex; gap: 8px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
.chat-input-area input { flex: 1; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; outline: none; }
.chat-input-area input:focus { border-color: #0f3460; }
/* 加载动画 */
.spinner { display: none; width: 20px; height: 20px; border: 3px solid #f0f0f0; border-top: 3px solid #0f3460; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
/* Toast */
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 999; animation: fadeIn .3s; }
.toast.success { background: #52c41a; }
.toast.error { background: #e94560; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
/* 响应式 */
@media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <span style="font-size:28px">📄</span>
  <div>
    <h1>多模态试卷智能解析 Agent</h1>
    <span style="font-size:12px;color:#aaa">ReAct Agent · OCR · RAG · 知识点分析</span>
  </div>
  <span class="badge">AI Agent</span>
</div>

<div class="container">
  <!-- 左栏：上传 + OCR -->
  <div>
    <div class="panel" style="margin-bottom:20px">
      <div class="panel-header">📤 上传试卷</div>
      <div class="panel-body">
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div class="icon">📷</div>
          <p>点击上传或拖拽试卷图片<br><small>支持 JPG / PNG / WebP</small></p>
          <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
        </div>
        <img id="preview" class="preview-img">
        <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary" id="uploadBtn" onclick="uploadAndOCR()" disabled>🔍 开始识别</button>
          <div class="spinner" id="uploadSpinner"></div>
          <span id="uploadStatus" style="font-size:13px;color:#999"></span>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">📝 OCR 识别结果 <span id="ocrCount" style="color:#999;font-weight:400;font-size:13px"></span></div>
      <div class="panel-body">
        <div class="ocr-result" id="ocrResult">
          <p style="color:#ccc;text-align:center;padding:40px">上传试卷图片开始识别</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 右栏：对话 -->
  <div class="panel" style="display:flex;flex-direction:column">
    <div class="panel-header">💬 智能问答 <span style="color:#999;font-weight:400;font-size:12px;margin-left:auto">基于 ReAct Agent</span></div>
    <div class="panel-body" style="flex:1;display:flex;flex-direction:column">
      <div class="chat-area" id="chatArea">
        <div class="chat-msg agent">
          👋 你好！我是试卷智能解析助手。<br><br>
          使用方法：<br>
          1️⃣ 在左侧<strong>上传试卷图片</strong>，我会自动识别内容<br>
          2️⃣ 然后在下方<strong>输入你的问题</strong>，比如：<br>
          &nbsp;&nbsp;&nbsp;• "第1题考了什么知识点？"<br>
          &nbsp;&nbsp;&nbsp;• "帮我讲解第2题的解题思路"<br>
          &nbsp;&nbsp;&nbsp;• "这份试卷主要考察哪些内容？"
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')askAgent()">
        <button class="btn btn-primary" onclick="askAgent()">发送</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';
let currentDocId = null;
let currentImagePath = null;

// === 文件上传 ===
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('preview').src = ev.target.result;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('uploadBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

// 拖拽支持
const zone = document.getElementById('uploadZone');
zone.ondragover = e => { e.preventDefault(); zone.classList.add('drag-over'); };
zone.ondragleave = () => zone.classList.remove('drag-over');
zone.ondrop = e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) {
    document.getElementById('fileInput').files = e.dataTransfer.files;
    handleFile({target: {files: [file]}});
  }
};

// === OCR 识别 ===
async function uploadAndOCR() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return;

  const btn = document.getElementById('uploadBtn');
  const spinner = document.getElementById('uploadSpinner');
  const status = document.getElementById('uploadStatus');

  btn.disabled = true;
  spinner.style.display = 'inline-block';
  status.textContent = '正在识别...';

  const form = new FormData();
  form.append('file', file);

  try {
    const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
    const data = await res.json();

    currentDocId = data.document_id;
    currentImagePath = data.image_path;

    // 显示结果
    const container = document.getElementById('ocrResult');
    document.getElementById('ocrCount').textContent = `(${data.box_count} 个文本块)`;

    if (data.boxes.length === 0) {
      container.innerHTML = '<p style="color:#999;text-align:center;padding:20px">未识别到文本内容</p>';
    } else {
      container.innerHTML = data.boxes.map(b => `
        <div class="text-block ${b.is_low_confidence ? 'low-conf' : ''}">
          <span>${escapeHtml(b.text)}</span>
          <span class="conf">${(b.confidence*100).toFixed(0)}%${b.is_low_confidence ? ' ⚠' : ''}</span>
        </div>
      `).join('');
    }

    status.textContent = `识别完成，${data.low_confidence_count} 个低置信度`;
    status.style.color = data.low_confidence_count > 0 ? '#e94560' : '#52c41a';

    // 自动发送到聊天
    addChatMsg('system', `试卷已上传并识别完成，共识别 ${data.box_count} 个文本块。现在可以提问了！`);

  } catch (err) {
    status.textContent = '连接失败，请确认后端服务已启动';
    status.style.color = '#e94560';
    showToast('连接后端失败！请确认已执行 python run.py', 'error');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

// === Agent 问答 ===
async function askAgent() {
  const input = document.getElementById('chatInput');
  const question = input.value.trim();
  if (!question) return;

  input.value = '';
  addChatMsg('user', question);

  const loading = addChatMsg('agent', '<span class="spinner" style="display:inline-block;width:16px;height:16px;border-width:2px"></span> 思考中...');

  const form = new FormData();
  form.append('question', question);
  if (currentImagePath) form.append('image_path', currentImagePath);

  try {
    const res = await fetch(`${API}/ask`, { method: 'POST', body: form });
    const data = await res.json();

    loading.innerHTML = formatMarkdown(data.answer);
  } catch (err) {
    loading.innerHTML = '请求失败，请确认后端服务已启动 (python run.py)';
    loading.style.color = '#e94560';
  }
}

// === 辅助函数 ===
function addChatMsg(role, content) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  div.innerHTML = content;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function formatMarkdown(text) {
  // 简单 Markdown 渲染
  let html = escapeHtml(text);
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/---/g, '<hr>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
</body>
</html>
